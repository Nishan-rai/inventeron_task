<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users Data Fetch App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5.3.8 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">

    <div class="glass-card text-center mb-4">
        <h2 class="mb-3">🌐 Public API Users Data</h2>
        <button class="btn btn-custom" id="fetchBtn">Fetch Users</button>
    </div>

    <!-- Custom Loader -->
    <div class="loader-container" id="loader">
        <div class="custom-loader"></div>
        <p>Fetching Data...</p>
    </div>

    <!-- Error Message -->
    <div class="alert alert-danger d-none" id="errorMessage"></div>

    <!-- Data Table -->
    <div class="table-responsive d-none" id="tableContainer">
        <table class="table table-bordered table-hover table-dark align-middle text-center">
            <thead class="table-info text-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Website</th>
                    <th>Company</th>
                    <th>City</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="script.js"></script>

</body>
</html>
