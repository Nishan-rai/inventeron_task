<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Loops </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">
    <div class="glass-card text-center">
        <h1 class="mb-4">JavaScript Loops </h1>

        <div class="row g-3">

            <div class="col-md-3 col-6">
                <button class="loop-btn" onclick="forLoop()">For Loop</button>
            </div>

            <div class="col-md-3 col-6">
                <button class="loop-btn" onclick="whileLoop()">While Loop</button>
            </div>

            <div class="col-md-3 col-6">
                <button class="loop-btn" onclick="doWhileLoop()">Do While</button>
            </div>

            <div class="col-md-3 col-6">
                <button class="loop-btn" onclick="forOfLoop()">For...of</button>
            </div>

            <div class="col-md-3 col-6">
                <button class="loop-btn" onclick="forInLoop()">For...in</button>
            </div>

            <div class="col-md-3 col-6">
                <button class="loop-btn" onclick="breakDemo()">Break</button>
            </div>

            <div class="col-md-3 col-6">
                <button class="loop-btn" onclick="continueDemo()">Continue</button>
            </div>

            <div class="col-md-3 col-6">
                <button class="loop-btn" onclick="nestedLoop()">Nested Loop</button>
            </div>

        </div>

        <div class="output-section mt-4" id="output">
            Click any button to see output...
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
